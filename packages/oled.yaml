i2c:
  id: oled_bus
  sda:
    number: GPIO9
    ignore_strapping_warning: true
  scl: GPIO10
  scan: true
  frequency: 400kHz

globals:
  - id: mqtt_connected
    type: bool
    restore_value: false
    initial_value: "false"

font:
  - file: "https://raw.githubusercontent.com/Templarian/MaterialDesign-Webfont/v7.4.47/fonts/materialdesignicons-webfont.ttf"
    id: font_icons
    size: 10
    glyphs:
      - "\U000F05A9" # mdi-wifi
      - "\U000F05AA" # mdi-wifi-off
  - file: "gfonts://Roboto Mono"
    id: font_header
    size: 10
  - file: "gfonts://Roboto Mono"
    id: font_label
    size: 7
  - file: "gfonts://Roboto Mono"
    id: font_value
    size: 14
    glyphs: " 0123456789"

display:
  - platform: ssd1306_i2c
    id: oled
    i2c_id: oled_bus
    model: SSD1306 128x32
    address: 0x3C
    update_interval: 1s
    lambda: |-
      if (id(mqtt_connected)) {
        it.filled_circle(68, 5, 3);
      } else {
        it.circle(68, 5, 3);
      }

      if (id(wifi_component).is_connected()) {
        it.print(74, 0, id(font_icons), "\U000F05A9");
      } else {
        it.print(74, 0, id(font_icons), "\U000F05AA");
      }
      it.print(127, 0, id(font_header), TextAlign::TOP_RIGHT, "${device_id}");
      it.horizontal_line(0, 10, 128);

      if (millis() < (${warmup_seconds} * 1000UL)) {
        it.print(64, 18, id(font_header), TextAlign::CENTER, "WARMING UP");
        return;
      }

      const bool stale = id(last_pms_update_ms) == 0 ||
                         (uint32_t) (millis() - id(last_pms_update_ms)) > (${stale_seconds} * 1000UL);
      if (!id(pms_pm25).has_state() || stale) {
        it.print(64, 18, id(font_header), TextAlign::CENTER, "SENSOR ERROR");
        return;
      }

      it.vertical_line(42, 11, 21);
      it.vertical_line(85, 11, 21);

      it.print(21, 11, id(font_label), TextAlign::TOP_CENTER, "PM1");
      it.print(64, 11, id(font_label), TextAlign::TOP_CENTER, "PM2.5");
      it.print(106, 11, id(font_label), TextAlign::TOP_CENTER, "PM10");

      it.printf(21, 18, id(font_value), TextAlign::TOP_CENTER, "%.0f", id(pms_pm1).state);
      it.printf(64, 18, id(font_value), TextAlign::TOP_CENTER, "%.0f", id(pms_pm25).state);
      it.printf(106, 18, id(font_value), TextAlign::TOP_CENTER, "%.0f", id(pms_pm10).state);
