i2c:
  id: oled_bus
  sda:
    number: GPIO9
    ignore_strapping_warning: true
  scl: GPIO10
  scan: true
  frequency: 400kHz

font:
  - file: "gfonts://Roboto Mono"
    id: font_small
    size: 8
  - file: "gfonts://Roboto Mono"
    id: font_large
    size: 18
    glyphs: " 0123456789"

display:
  - platform: ssd1306_i2c
    id: oled
    i2c_id: oled_bus
    model: SSD1306 128x32
    address: 0x3C
    update_interval: 1s
    lambda: |-
      it.print(0, 0, id(font_small), "PM2.5");
      it.print(127, 0, id(font_small), TextAlign::TOP_RIGHT, "${device_id}");

      if (id(wifi_component).is_connected()) {
        it.filled_rectangle(78, 6, 2, 2);
        it.filled_rectangle(81, 4, 2, 4);
        it.filled_rectangle(84, 2, 2, 6);
      } else {
        it.line(78, 1, 85, 8);
        it.line(85, 1, 78, 8);
      }
      it.horizontal_line(0, 9, 128);

      if (millis() < (${warmup_seconds} * 1000UL)) {
        it.print(64, 17, id(font_small), TextAlign::CENTER, "WARMING UP");
        return;
      }

      const bool stale = id(last_pms_update_ms) == 0 ||
                         (uint32_t) (millis() - id(last_pms_update_ms)) > (${stale_seconds} * 1000UL);
      if (!id(pms_pm25).has_state() || stale) {
        it.print(64, 17, id(font_small), TextAlign::CENTER, "SENSOR ERROR");
        return;
      }

      it.vertical_line(61, 10, 22);
      it.printf(58, 10, id(font_large), TextAlign::TOP_RIGHT, "%.0f", id(pms_pm25).state);

      it.print(64, 11, id(font_small), "PM1");
      it.printf(126, 11, id(font_small), TextAlign::TOP_RIGHT, "%.0f", id(pms_pm1).state);
      it.print(64, 22, id(font_small), "PM10");
      it.printf(126, 22, id(font_small), TextAlign::TOP_RIGHT, "%.0f", id(pms_pm10).state);
