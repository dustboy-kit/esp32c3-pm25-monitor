api:

ota:
  - platform: esphome

wifi:
  id: wifi_component
  ap:
    ssid: ${friendly_name}
    ap_timeout: ${wifi_ap_timeout_seconds}s
  on_connect:
    - globals.set:
        id: wifi_disconnected_since_ms
        value: "0"
  on_disconnect:
    - lambda: |-
        if (id(wifi_disconnected_since_ms) == 0) {
          id(wifi_disconnected_since_ms) = millis();
        }

captive_portal:

time:
  - platform: sntp
    id: network_time
    timezone: ${timezone}

improv_serial:

esp32_improv:
  authorizer: none

web_server:
  version: 3
  include_internal: false

dashboard_import:
  package_import_url: github://dustboy-kit/esp32c3-pm25-monitor/dbk.yaml@main
  import_full_config: false
