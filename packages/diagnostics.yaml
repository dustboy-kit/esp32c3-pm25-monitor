sensor:
  - platform: wifi_signal
    id: wifi_rssi
    name: Wi-Fi RSSI
    update_interval: 30s
    entity_category: diagnostic

  - platform: uptime
    name: Uptime
    update_interval: 60s
    entity_category: diagnostic

text_sensor:
  - platform: version
    name: ESPHome Version
    entity_category: diagnostic

  - platform: wifi_info
    ip_address:
      name: IP Address
      entity_category: diagnostic
    mac_address:
      name: MAC Address
      entity_category: diagnostic
    scan_results:
      name: Wi-Fi Scan Results
      entity_category: diagnostic

button:
  - platform: restart
    name: Restart
    entity_category: diagnostic

  - platform: safe_mode
    name: Restart in Safe Mode
    entity_category: diagnostic
