name: Validate firmware

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  esphome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: esphome config dbk.yaml
      - run: esphome config factory.yaml
      - run: esphome compile factory.yaml
      - uses: actions/upload-artifact@v4
        with:
          name: dbk-firmware
          path: |
            .esphome/build/dbk/.pioenvs/dbk/firmware.factory.bin
            .esphome/build/dbk/.pioenvs/dbk/firmware.ota.bin
