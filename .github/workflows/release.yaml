name: Release firmware

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: esphome compile factory.yaml
      - name: Collect release files
        run: |
          mkdir -p release
          cp .esphome/build/dbk/.pioenvs/dbk/firmware.factory.bin release/dbk.factory.bin
          cp .esphome/build/dbk/.pioenvs/dbk/firmware.ota.bin release/dbk.ota.bin
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release/*.bin --generate-notes --verify-tag
